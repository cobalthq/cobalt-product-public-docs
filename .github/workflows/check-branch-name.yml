name: "Check the branch name"
on:
  push:
    branches-ignore:
      - 'main'
permissions:
  contents: read
jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/check-branch-name
