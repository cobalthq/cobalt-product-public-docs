name: Check the branch name
description: >
  Verifies that a branch name follows the standardized naming scheme.
  Defaults to checking github.ref_name when no branch-name input is
  supplied. See scripts/validate-branch-name.sh for the accepted
  patterns and validation logic.

  Vendored from cobalthq/cobalt-github/.github/actions/check-branch-name
  @ 949578c037dd813e112ef8f8b85ebab60dc261fb (2026-05-20). This repo is
  public and cannot consume the action directly from the private
  cobalt-github source, so the action is copied here verbatim. Keep in
  sync with upstream when the shared action changes.

inputs:
  branch-name:
    description: >
      Branch name to validate. Defaults to the ref that triggered the
      workflow (github.ref_name).
    required: false
    default: ${{ github.ref_name }}

runs:
  using: composite
  steps:
    - name: Check if the branch uses standardized naming scheme
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        BRANCH_NAME: ${{ inputs.branch-name }}
      run: bash "$ACTION_PATH/scripts/validate-branch-name.sh"
